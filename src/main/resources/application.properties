# ---------------------------------------------------------
# Server Configuration
# ---------------------------------------------------------
# Run the frontend on 8081 so it doesn't crash with the backend on 8080
server.port=8081
spring.application.name=book-partner-frontend

# ---------------------------------------------------------
# Backend API Connection
# ---------------------------------------------------------
# This is the default URL your RestClient will use to fetch data.
# When we build the JAR later, users can override this via command line.
backend.api.url=http://localhost:8080

# ---------------------------------------------------------
# Thymeleaf UI Development Settings
# ---------------------------------------------------------
# CRITICAL FOR YOUR TEAM: Disables HTML caching. 
# This means when you or your teammates edit an HTML/CSS file, 
# you just refresh the browser to see changes. You do NOT have to 
# restart the Java server every time you change a color or a div!
spring.thymeleaf.cache=false