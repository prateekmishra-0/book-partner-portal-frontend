<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Profile | PubsPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .hero-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        dialog::backdrop { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); }
        dialog { border: none; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); padding: 0; max-width: 32rem; width: 100%; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

<nav class="sticky top-0 z-40 glass shadow-sm px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <a href="/">
            <div class="flex items-center space-x-2">
                <i class="fas fa-book-open text-indigo-600 text-2xl"></i>
                <span class="text-xl font-bold tracking-tight text-slate-800">Pubs<span class="text-indigo-600">Portal</span></span>
            </div>
        </a>
    </div>
</nav>

<main class="py-10 px-6 max-w-5xl mx-auto">

    <nav class="mb-8" aria-label="Breadcrumb">
        <ol class="flex items-center space-x-2 text-sm font-medium text-slate-500 overflow-x-auto pb-2 sm:pb-0">
            <li><a href="/" class="hover:text-indigo-600 transition flex items-center whitespace-nowrap"><i class="fas fa-home mr-1.5 mb-0.5"></i> Home</a></li>
            <li><i class="fas fa-chevron-right text-[10px] text-slate-400 mt-0.5"></i></li>
            <li><a href="/employees" class="hover:text-indigo-600 transition whitespace-nowrap">Employees Directory</a></li>
            <li><i class="fas fa-chevron-right text-[10px] text-slate-400 mt-0.5"></i></li>
            <li class="text-slate-800 font-semibold truncate max-w-[150px] sm:max-w-none" aria-current="page">Employee Profile</li>
        </ol>
    </nav>

    <div id="detailsContainer">
        <p class="text-slate-500 animate-pulse"><i class="fas fa-spinner fa-spin mr-2"></i>Loading employee data...</p>
    </div>

</main>

<dialog id="editEmployeeModal">
    <div class="bg-white">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h2 class="text-xl font-bold text-slate-900"><i class="fas fa-user-edit text-indigo-500 mr-2"></i> Update Profile</h2>
            <button type="button" id="closeEditModalBtn" class="text-slate-400 hover:text-slate-700 p-2"><i class="fas fa-times text-lg"></i></button>
        </div>
        <div class="p-6">
            <form id="editEmployeeForm" class="space-y-4 text-sm">
                <div>
                    <label for="editEmpId" class="block font-semibold text-slate-700 mb-1">Employee ID (Locked)</label>
                    <input type="text" id="editEmpId" readonly class="w-full rounded-xl border-slate-200 bg-slate-100 text-slate-500 p-3 cursor-not-allowed outline-none font-mono">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="editFname" class="block font-semibold text-slate-700 mb-1">First Name <span class="text-red-500">*</span></label>
                        <input type="text" id="editFname" required maxlength="20" class="w-full rounded-xl border-slate-200 bg-slate-50 p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label for="editLname" class="block font-semibold text-slate-700 mb-1">Last Name <span class="text-red-500">*</span></label>
                        <input type="text" id="editLname" required maxlength="30" class="w-full rounded-xl border-slate-200 bg-slate-50 p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label for="editMinit" class="block font-semibold text-slate-700 mb-1">Middle Initial</label>
                    <input type="text" id="editMinit" maxlength="1" class="w-full rounded-xl border-slate-200 bg-slate-50 p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition uppercase">
                </div>

                <div>
                    <label for="editJobSelect" class="block font-semibold text-slate-700 mb-1">Job Role <span class="text-red-500">*</span></label>
                    <select id="editJobSelect" required class="w-full rounded-xl border-slate-200 bg-slate-50 p-3 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="">Select a Job</option>
                    </select>
                </div>

                <div>
                    <label for="editJobLvl" class="block font-semibold text-slate-700 mb-1">Job Level <span class="text-red-500">*</span></label>
                    <input type="number" id="editJobLvl" required class="w-full rounded-xl border-slate-200 bg-slate-50 p-3 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    <span id="editJobLvlError" style="display: none;" class="text-red-500 text-xs font-bold mt-1 block">Invalid level.</span>
                    <div id="editJobLvlHelp" class="text-xs text-slate-500 mt-1">Select a job role to see allowed levels.</div>
                </div>

                <div>
                    <label for="editPubSelect" class="block font-semibold text-slate-700 mb-1">Publisher <span class="text-red-500">*</span></label>
                    <select id="editPubSelect" required class="w-full rounded-xl border-slate-200 bg-slate-50 p-3 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="">Select a Publisher</option>
                    </select>
                </div>

                <div id="editFormErrorMsg" style="display: none;" class="bg-red-50 border border-red-200 text-red-600 p-3 rounded-xl text-xs font-bold"></div>

                <div class="pt-4 flex justify-end border-t border-slate-100 mt-6">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-indigo-700 transition shadow-md">Update Details</button>
                </div>
            </form>
        </div>
    </div>
</dialog>

<div id="deleteConfirmModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-opacity">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center overflow-hidden">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-5 text-red-500 text-4xl shadow-inner">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Delete Employee?</h2>
        <p class="text-slate-500 mb-8 text-sm">Are you sure you want to delete <strong id="deleteEmpNameModal" class="text-slate-800"></strong>? This action cannot be undone.</p>
        <div class="flex space-x-3">
            <button type="button" onclick="toggleModal('deleteConfirmModal')" class="flex-1 py-3 rounded-xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">Cancel</button>
            <button type="button" id="confirmDeleteBtn" class="flex-1 py-3 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 transition shadow-md">Yes, Delete</button>
        </div>
    </div>
</div>

<script src="/js/employee/employee-details.js"></script>
</body>
</html>
