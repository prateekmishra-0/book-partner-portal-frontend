name: Manual Git Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release Version Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'Release Notes / Description'
        required: false
        default: 'Manual release triggered via GitHub Actions.'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release in your repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: Release ${{ github.event.inputs.version_tag }}
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false
          files: target/*.jar # Attaches the JAR file to the release!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}