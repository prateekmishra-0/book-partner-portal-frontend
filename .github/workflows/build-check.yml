name: Frontend Build Check & Artifact

on:
  pull_request:
    branches: [ "main" ]

jobs:
  pr-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Package (No Tests)
        # 'package' compiles the code AND generates the .jar file
        run: mvn clean package -DskipTests

      - name: Upload JAR as Artifact
        uses: actions/upload-artifact@v3
        with:
          # Naming it dynamically so you know which PR generated this artifact
          name: frontend-app-pr-${{ github.event.pull_request.number }}
          path: target/*.jar
          retention-days: 7